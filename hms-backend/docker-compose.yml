      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-appointment:3306/appointment_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Priyal212931
 
  billing-service:
