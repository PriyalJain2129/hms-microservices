      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-billing:3306/billing_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
